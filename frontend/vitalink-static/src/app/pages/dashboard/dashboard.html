<div class="main-wrapper">
  <app-header></app-header>
<div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:20px; margin-bottom:32px;">
  <app-card *ngFor="let card of cards" [data]="card"></app-card>
</div>
  
  <div class="section-header">VOLUME DE ATENDIMENTOS</div>
  <section class="grid-section section-volume">
    <app-chart class="chart-card" title="Número de Atendimentos" subtitle="Evolução diária" [type]="'line'" [data]="atendimentosData"></app-chart>
    <app-chart class="chart-card" title="Horários de Pico" subtitle="Volume por hora" [type]="'bar'" [data]="picoData"></app-chart>
  </section>

  <div class="section-header">TEMPOS OPERACIONAIS</div>
  <section class="grid-section section-tempos">
    <app-chart class="chart-card" title="Tempo Médio de Resposta" subtitle="Semanal" [type]="'line'" [data]="respostaData"></app-chart>
    <app-chart class="chart-card" title="Tempo Médio de Agendamento" subtitle="Por especialidade" [type]="'bar'" [data]="agendamentoData"></app-chart>
    <app-chart class="chart-card" title="Taxa de No-Show" subtitle="% semanal" [type]="'line'" [data]="noShowData"></app-chart>
  </section>

  <div class="section-header">CANAIS E CONVERSÃO</div>
  <section class="grid-section section-canais">
    <app-chart class="chart-card" title="Taxa de Conversão" subtitle="Mensal" [type]="'bar'" [data]="conversaoData"></app-chart>
    <app-chart class="chart-card" title="Volume por Canal" subtitle="WhatsApp vs Instagram" [type]="'doughnut'" [data]="canalData"></app-chart>
    <app-chart class="chart-card" title="Especialidades" subtitle="Mais demandadas" [type]="'bar'" [data]="especialidadesData"></app-chart>
  </section>

  <div class="section-header">PERFORMANCE POR ATENDENTE</div>
  <section class="grid-section section-perf">
    <app-chart class="chart-card" title="Atendimentos e Conversões" subtitle="Por atendente" [type]="'bar'" [data]="atendentesData"></app-chart>
    <app-chart class="chart-card" title="Radar de Desempenho" subtitle="Indicadores" [type]="'radar'" [data]="radarData"></app-chart>
  </section>

</div>

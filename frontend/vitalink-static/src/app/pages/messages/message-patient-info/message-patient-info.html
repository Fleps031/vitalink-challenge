<section class="patient-info">
    <div class="infos">
        <div class="info">
            <p>Nome</p>
            <p>{{patient.name}}</p>
        </div>

        <div class="info">
            <p>Data de nascimento</p>
            <p>{{patient.birthday}}</p>
        </div>

        <div class="info">
            <p>E-mail</p>
            <p>{{patient.email}}</p>
        </div>

        <div class="info">
            <p>CPF</p>
            <p>{{patient.document}}</p>
        </div>
    </div>

    <button>Histórico de consultas</button>
    <button>Alterar cadastro</button>

    <div>
        <button>Finalizar atendimento</button>
    </div>
</section>

<section class="messages-container">
    <h1 id="title">Seus atendimentos</h1>
    <div class="divided-section">

        <section class="message-vertical-section">
            <section class="message-cards-section">
                <h2>Em atendimento</h2>
                <app-message-list [messageCards]="messageList.IN_CALL" (selectCard)="changeSelectedCard($event)" [selectedCard]="selectedCard"></app-message-list>
            </section>
            <section class="message-cards-section">
                <h2>Em aberto</h2>
                <app-message-list [messageCards]="messageList.WAITING_CALL" (selectCard)="changeSelectedCard($event)" [selectedCard]="selectedCard"></app-message-list>
            </section>
            <section class="message-cards-section">
                <h2>Finalizados</h2>
                <app-message-list [messageCards]="messageList.FINISHED" (selectCard)="changeSelectedCard($event)" [selectedCard]="selectedCard"></app-message-list>
            </section>

        </section>
        <app-message-board [allMessages]="serverMessages$ | async" [selectedConversation]="selectedCard.patient.phone" (sendMessageEvent)="sendMessage($event)"></app-message-board>

        <div id="nurse-wrapper">
            <img src="EnfermeiraDSA.svg" id="nurse">
        </div>
    </div>


</section>
